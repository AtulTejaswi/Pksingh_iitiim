name: Deploy to Render and Run E2E

on:
  push:
    branches: [ main ]

jobs:
  deploy-and-test:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max_old_space_size=4096
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Get Render service info
        id: render-info
        run: |
          if [ -z "${{ secrets.RENDER_API_KEY }}" ] || [ -z "${{ secrets.RENDER_SERVICE_ID }}" ]; then
            echo "RENDER secrets not provided — skipping deploy step";
            echo "skipped=true" >> $GITHUB_OUTPUT;
            exit 0;
          fi
          svc_id=${{ secrets.RENDER_SERVICE_ID }}
          info=$(curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" "https://api.render.com/v1/services/${svc_id}")
          echo "info=$info" >> $GITHUB_OUTPUT
          domain=$(echo "$info" | jq -r .defaultDomain)
          echo "domain=$domain" >> $GITHUB_OUTPUT

      - name: Trigger Render deploy
        if: steps.render-info.outputs.skipped != 'true'
        id: trigger
        run: |
          svc_id=${{ secrets.RENDER_SERVICE_ID }}
          resp=$(curl -s -X POST -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" -H "Content-Type: application/json" -d '{}' "https://api.render.com/v1/services/${svc_id}/deploys")
          echo "resp=$resp" >> $GITHUB_OUTPUT
          deploy_id=$(echo "$resp" | jq -r .id)
          echo "deploy_id=$deploy_id" >> $GITHUB_OUTPUT

      - name: Wait for deploy
        if: steps.render-info.outputs.skipped != 'true'
        run: |
          svc_id=${{ secrets.RENDER_SERVICE_ID }}
          deploy_id=${{ steps.trigger.outputs.deploy_id }}
          status=""
          for i in {1..60}; do
            resp=$(curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" "https://api.render.com/v1/services/${svc_id}/deploys/${deploy_id}")
            status=$(echo "$resp" | jq -r .status)
            echo "Deploy status: $status"
            if [ "$status" = "success" ]; then
              exit 0
            fi
            if [ "$status" = "failed" ]; then
              echo "Deploy failed: $resp"
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for deploy"; exit 1

      - name: Run E2E tests against deployed site
        if: steps.render-info.outputs.skipped != 'true'
        env:
          E2E_API_BASE: https://${{ steps.render-info.outputs.domain }}/api
        run: |
          echo "E2E_API_BASE=$E2E_API_BASE"
          npx playwright install --with-deps
          npm run test:e2e
          node tests/scripts/upload_test.mjs || true

      - name: Run local E2E (fallback)
        if: steps.render-info.outputs.skipped == 'true'
        env:
          ADMIN_PASSWORD: adminpassword123
        run: |
          echo "Render secrets missing; running local e2e against localhost"
          npx prisma db push
          npm run build
          node dist/server.js > server.log 2>&1 &
          SERVER_PID=$!
          npx wait-on http://localhost:4000/api/health -t 30000
          npx playwright install --with-deps
          if ! npm run test:e2e; then
            echo "E2E tests failed! Server logs:"
            cat server.log
            exit 1
          fi
          kill $SERVER_PID || true
