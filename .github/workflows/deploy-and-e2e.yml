name: Deploy to Render and Run E2E

on:
  push:
    branches: [main]

jobs:
  deploy-and-test:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max_old_space_size=4096
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Check Render secrets
        id: render-check
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ RENDER_API_KEY or RENDER_SERVICE_ID not configured."
            echo "Skipping deploy and E2E tests."
            echo "To enable: add RENDER_API_KEY and RENDER_SERVICE_ID as repository secrets."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

      - name: Get Render service info
        if: steps.render-check.outputs.skip == 'false'
        id: render-info
        run: |
          svc_id=${{ secrets.RENDER_SERVICE_ID }}
          info=$(curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" "https://api.render.com/v1/services/${svc_id}")
          domain=$(echo "$info" | jq -r .defaultDomain)
          echo "domain=$domain" >> $GITHUB_OUTPUT

      - name: Trigger Render deploy
        if: steps.render-check.outputs.skip == 'false'
        id: trigger
        run: |
          svc_id=${{ secrets.RENDER_SERVICE_ID }}
          resp=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://api.render.com/v1/services/${svc_id}/deploys")
          deploy_id=$(echo "$resp" | jq -r .id)
          echo "deploy_id=$deploy_id" >> $GITHUB_OUTPUT

      - name: Wait for deploy
        if: steps.render-check.outputs.skip == 'false'
        run: |
          svc_id=${{ secrets.RENDER_SERVICE_ID }}
          deploy_id=${{ steps.trigger.outputs.deploy_id }}
          for i in $(seq 1 60); do
            resp=$(curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/${svc_id}/deploys/${deploy_id}")
            status=$(echo "$resp" | jq -r .status)
            echo "Deploy status: $status"
            if [ "$status" = "success" ]; then exit 0; fi
            if [ "$status" = "failed" ]; then
              echo "Deploy failed: $resp"
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for deploy"
          exit 1

      - name: Run E2E tests against deployed site
        if: steps.render-check.outputs.skip == 'false'
        env:
          E2E_API_BASE: https://${{ steps.render-info.outputs.domain }}/api
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
        run: |
          npx playwright install --with-deps
          npm run test:e2e
          node tests/scripts/upload_test.mjs || true
