<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
  <title>PK Sir Logo</title>
  <desc>Premium logo for PK Singh — Mentor, Author, IITian</desc>

  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5C842"/>
      <stop offset="50%" style="stop-color:#E8A820"/>
      <stop offset="100%" style="stop-color:#C87C0A"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5C842"/>
      <stop offset="100%" style="stop-color:#E8A820"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#162B55"/>
      <stop offset="100%" style="stop-color:#0A1628"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="680" height="420" fill="#0B1A34" rx="16"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#F5C842" stroke-width="0.5">
    <line x1="0" y1="60" x2="680" y2="60"/>
    <line x1="0" y1="120" x2="680" y2="120"/>
    <line x1="0" y1="180" x2="680" y2="180"/>
    <line x1="0" y1="240" x2="680" y2="240"/>
    <line x1="0" y1="300" x2="680" y2="300"/>
    <line x1="0" y1="360" x2="680" y2="360"/>
    <line x1="60" y1="0" x2="60" y2="420"/>
    <line x1="120" y1="0" x2="120" y2="420"/>
    <line x1="180" y1="0" x2="180" y2="420"/>
    <line x1="240" y1="0" x2="240" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="420"/>
    <line x1="360" y1="0" x2="360" y2="420"/>
    <line x1="420" y1="0" x2="420" y2="420"/>
    <line x1="480" y1="0" x2="480" y2="420"/>
    <line x1="540" y1="0" x2="540" y2="420"/>
    <line x1="600" y1="0" x2="600" y2="420"/>
  </g>

  <!-- Scattered math symbols -->
  <text x="68" y="100" font-family="Georgia, serif" font-size="28" fill="#F5C842" opacity="0.12" transform="rotate(-15,68,100)">∑</text>
  <text x="590" y="330" font-family="Georgia, serif" font-size="24" fill="#F5C842" opacity="0.12" transform="rotate(12,590,330)">π</text>
  <text x="80" y="340" font-family="Georgia, serif" font-size="20" fill="#F5C842" opacity="0.10" transform="rotate(-8,80,340)">∫</text>
  <text x="610" y="90" font-family="Georgia, serif" font-size="22" fill="#F5C842" opacity="0.10" transform="rotate(10,610,90)">Δ</text>
  <text x="560" y="180" font-family="Georgia, serif" font-size="18" fill="#F5C842" opacity="0.08">α²</text>
  <text x="105" y="200" font-family="Georgia, serif" font-size="16" fill="#F5C842" opacity="0.08">e=mc²</text>

  <!-- Outer gold ring -->
  <circle cx="340" cy="195" r="108" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.6"/>
  <circle cx="340" cy="195" r="115" fill="none" stroke="#F5C842" stroke-width="0.5" opacity="0.25"/>

  <!-- Shield crest -->
  <path d="M340 90 L410 125 L410 195 Q410 255 340 290 Q270 255 270 195 L270 125 Z"
        fill="url(#shieldGrad)" stroke="url(#goldGrad)" stroke-width="2"/>
  <path d="M340 100 L402 132 L402 195 Q402 248 340 280 Q278 248 278 195 L278 132 Z"
        fill="none" stroke="#F5C842" stroke-width="0.8" opacity="0.4"/>
  <line x1="298" y1="138" x2="382" y2="138" stroke="url(#goldGrad2)" stroke-width="1.5" opacity="0.7"/>

  <!-- PK Letters -->
  <g filter="url(#glow)">
    <rect x="299" y="152" width="9" height="72" fill="url(#goldGrad)" rx="2"/>
    <path d="M308 152 Q338 152 338 168 Q338 184 308 184" fill="none" stroke="url(#goldGrad)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="308" y="152" width="22" height="8" fill="url(#goldGrad)" rx="1"/>
    <rect x="308" y="176" width="22" height="8" fill="url(#goldGrad)" rx="1"/>
    <rect x="348" y="152" width="9" height="72" fill="url(#goldGrad)" rx="2"/>
    <path d="M357 188 L383 152" fill="none" stroke="url(#goldGrad)" stroke-width="9" stroke-linecap="round"/>
    <path d="M357 188 L383 224" fill="none" stroke="url(#goldGrad)" stroke-width="9" stroke-linecap="round"/>
  </g>

  <line x1="305" y1="233" x2="375" y2="233" stroke="url(#goldGrad2)" stroke-width="1.2" opacity="0.9"/>
  <g transform="translate(340,245)">
    <polygon points="0,-6 2,-2 6,0 2,2 0,6 -2,2 -6,0 -2,-2" fill="url(#goldGrad)" opacity="0.9"/>
  </g>

  <!-- Wordmark -->
  <text x="340" y="325"
        font-family="'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif"
        font-size="42" font-weight="700" letter-spacing="14"
        text-anchor="middle" fill="url(#goldGrad)" filter="url(#glow)">PK SIR</text>

  <!-- Flanking decorative lines -->
  <line x1="130" y1="325" x2="185" y2="325" stroke="#F5C842" stroke-width="0.8" opacity="0.5"/>
  <line x1="495" y1="325" x2="550" y2="325" stroke="#F5C842" stroke-width="0.8" opacity="0.5"/>
  <polygon points="183,321 189,325 183,329" fill="#F5C842" opacity="0.5"/>
  <polygon points="497,321 491,325 497,329" fill="#F5C842" opacity="0.5"/>

  <!-- Tagline -->
  <text x="340" y="358"
        font-family="'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif"
        font-size="11.5" font-weight="400" letter-spacing="5"
        text-anchor="middle" fill="#F5C842" opacity="0.65">MENTOR · AUTHOR · IITian</text>

  <line x1="240" y1="372" x2="440" y2="372" stroke="url(#goldGrad2)" stroke-width="0.6" opacity="0.35"/>
</svg>
