services:
  - type: web
    name: pksingh-backend
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build && npx prisma db push
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./prod.db
      - key: LOCAL_JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://pksingh.netlify.app
      - key: NODE_VERSION
        value: "20.10.0"
