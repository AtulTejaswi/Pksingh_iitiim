services:
  - type: web
    name: pksingh-backend
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # IMPORTANT: Set DATABASE_URL in the Render dashboard (Supabase/Postgres connection string).
      # Do not commit real credentials to this repo.
      - key: LOCAL_JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: "20.10.0"
