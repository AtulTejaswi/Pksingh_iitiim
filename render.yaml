services:
  - type: web
    name: pksingh-backend
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build && npx prisma db push
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./dev.db
      - key: LOCAL_JWT_SECRET
        value: pksingh-jwt-secret-change-this-to-a-strong-random-value
      - key: ADMIN_PASSWORD
        value: adminpassword123
      - key: FRONTEND_URL
        value: https://pksingh-iitiim.vercel.app
      - key: NODE_VERSION
        value: "20.10.0"

databases:
  - name: pksingh-db
    plan: free
    databaseName: pksingh
    user: pksingh
